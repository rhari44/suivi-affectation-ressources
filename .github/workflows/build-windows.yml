name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build
        env:
          CI: false

      - run: npm run dist-win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/**
